<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime Character Explorer</title>
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-shell">
    
    <!-- Topbar -->
    <nav class="topbar">
      <div class="logo">🌸 Anime Explorer</div>
      <div class="topbar-actions">
        <button id="themeToggle" class="icon-btn" title="Toggle Theme">☀️</button>
      </div>
    </nav>

    <div class="shell-body">
      
      <!-- Sidebar -->
      <aside class="sidebar">
        <ul class="nav-links">
          <li class="active">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Home</span>
          </li>
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            <span>Favorites</span>
          </li>
          <li>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span>Settings</span>
          </li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <div class="container">
          <header class="app-header">
            <h1 class="gradient-text">Anime Character Explorer</h1>
            <p class="subtitle">Search your favorite characters instantly.</p>
          </header>

          <!-- Search -->
          <section class="search-section">
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="Search for a character (e.g. Naruto)..." autocomplete="off" />
              <button id="searchBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
              </button>
            </div>

            <!-- Toolbox Container -->
            <div id="controls" class="controls hidden">
              <select id="sortSelect">
                <option value="default">Sort by...</option>
                <option value="favorites-desc">Favorites: High to Low</option>
                <option value="favorites-asc">Favorites: Low to High</option>
                <option value="name-asc">Alphabetical: A-Z</option>
              </select>
              <!-- NEW RANGE FILTER -->
              <div class="range-inputs">
                <input type="number" id="minFav" placeholder="Min Pop (e.g. 1000)" class="range-box" />
                <span class="range-divider">-</span>
                <input type="number" id="maxFav" placeholder="Max Pop (e.g. 5000)" class="range-box" />
                <button id="applyRangeBtn" class="control-btn range-btn">Filter</button>
              </div>
              <button id="resetBtn" class="control-btn hidden">✖ Reset Filter</button>
            </div>
          </section>

          <!-- Loading -->
          <div id="loading" class="hidden">
            <div class="spinner"></div>
          </div>

          <!-- Results -->
          <section id="characterContainer" class="character-grid"></section>
        </div>
      </main>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
