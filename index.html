<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anime Character Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>🌸 Anime Character Explorer</h1>
  </header>

  <!-- Search -->
  <section class="search-section">
    <input type="text" id="searchInput" placeholder="Search anime character..." />
    <button id="searchBtn">Search</button>
  </section>

  <!-- Loading -->
  <div id="loading" class="hidden">Loading...</div>

  <!-- Results -->
  <section id="characterContainer"></section>

  <script src="script.js"></script>
</body>
</html>
